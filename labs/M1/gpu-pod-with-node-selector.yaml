# 演示 GPU 型号/节点选择的常见模式
apiVersion: v1
kind: Pod
metadata:
  name: gpu-test-a100
  labels:
    app: gpu-scheduling-lab
spec:
  restartPolicy: Never
  # 通常由 Node Feature Discovery + GPU Feature Discovery 注入
  nodeSelector:
    nvidia.com/gpu.product: NVIDIA-A100-SXM4-80GB
  containers:
    - name: cuda-vector-add
      image: nvcr.io/nvidia/k8s/cuda-sample:vectoradd-cuda12.5.0
      resources:
        limits:
          nvidia.com/gpu: 2
