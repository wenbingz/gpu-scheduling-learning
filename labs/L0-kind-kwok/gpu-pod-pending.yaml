# 故意触发 Insufficient nvidia.com/gpu — 观察 scheduler 行为
apiVersion: v1
kind: Pod
metadata:
  name: gpu-test-oom-schedule
  labels:
    app: gpu-scheduling-lab
spec:
  restartPolicy: Never
  tolerations:
    - key: kwok.x-k8s.io/node
      operator: Exists
      effect: NoSchedule
  containers:
    - name: pause
      image: registry.k8s.io/pause:3.10
      resources:
        limits:
          nvidia.com/gpu: 16   # 超过任意单节点容量 (max 8)
