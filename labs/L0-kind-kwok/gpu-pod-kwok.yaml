# 调度到 KWOK 假 GPU 节点的 Pod
# 需要 toleration 才能调度到 kwok 节点
apiVersion: v1
kind: Pod
metadata:
  name: gpu-test
  labels:
    app: gpu-scheduling-lab
spec:
  restartPolicy: Never
  tolerations:
    - key: kwok.x-k8s.io/node
      operator: Exists
      effect: NoSchedule
  containers:
    - name: pause
      image: registry.k8s.io/pause:3.10
      resources:
        limits:
          nvidia.com/gpu: 1
