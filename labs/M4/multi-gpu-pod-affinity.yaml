# Lab 4A: 分布式训练 — worker-1 必须和 worker-0 同节点
# worker-0 无 affinity（先调度）；worker-1 通过 podAffinity 跟随
---
apiVersion: v1
kind: Pod
metadata:
  name: train-worker-0
  labels:
    job: llm-train
    role: worker
    train-index: "0"
spec:
  restartPolicy: Never
  nodeSelector:
    nvidia.com/gpu.product: NVIDIA-A100-SXM4-80GB
  tolerations:
    - key: kwok.x-k8s.io/node
      operator: Exists
      effect: NoSchedule
  containers:
    - name: pause
      image: registry.k8s.io/pause:3.10
      resources:
        limits:
          nvidia.com/gpu: 2
---
apiVersion: v1
kind: Pod
metadata:
  name: train-worker-1
  labels:
    job: llm-train
    role: worker
    train-index: "1"
spec:
  restartPolicy: Never
  nodeSelector:
    nvidia.com/gpu.product: NVIDIA-A100-SXM4-80GB
  tolerations:
    - key: kwok.x-k8s.io/node
      operator: Exists
      effect: NoSchedule
  affinity:
    podAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              job: llm-train
              train-index: "0"
          topologyKey: kubernetes.io/hostname
  containers:
    - name: pause
      image: registry.k8s.io/pause:3.10
      resources:
        limits:
          nvidia.com/gpu: 2
