# Lab 4A: 带拓扑 label 的 KWOK 节点
---
apiVersion: v1
kind: Node
metadata:
  name: fake-gpu-node-nvlink-0
  annotations:
    kwok.x-k8s.io/node: fake
  labels:
    kubernetes.io/hostname: fake-gpu-node-nvlink-0
    nvidia.com/gpu.product: NVIDIA-A100-SXM4-80GB
