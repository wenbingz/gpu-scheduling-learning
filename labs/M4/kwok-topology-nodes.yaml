      effect: NoSchedule
status:
  allocatable:
    cpu: "64"
    memory: 512Gi
    nvidia.com/gpu: "8"
    pods: "110"
  capacity:
    cpu: "64"
    memory: 512Gi
    nvidia.com/gpu: "8"
    pods: "110"
  nodeInfo:
    architecture: arm64
    bootID: boot-nv0
    containerRuntimeVersion: kwok://0.6.1
    kernelVersion: 6.8.0-fake
    kubeProxyVersion: kwok://0.6.1
    kubeletVersion: v1.36.1
    machineID: machine-nv0
    operatingSystem: linux
    osImage: kwok fake node
    systemUUID: uuid-nv0
  phase: Running
