# Lab 5B: Kueue 队列示例（需先安装 Kueue）
# kubectl apply --server-side -f https://github.com/kubernetes-sigs/kueue/releases/download/v0.10.0/manifests.yaml
---
apiVersion: kueue.x-k8s.io/v1beta1
kind: ResourceFlavor
metadata:
  name: default
---
apiVersion: kueue.x-k8s.io/v1beta1
kind: ClusterQueue
metadata:
  name: gpu-cluster-queue
spec:
  resourceGroups:
    - coveredResources: ["nvidia.com/gpu", "cpu", "memory"]
      flavors:
        - name: default
          resources:
            - name: nvidia.com/gpu
              nominalQuota: 64
            - name: cpu
              nominalQuota: 512
            - name: memory
              nominalQuota: 1Ti
---
apiVersion: kueue.x-k8s.io/v1beta1
kind: LocalQueue
metadata:
  name: gpu-training
  namespace: default
spec:
  clusterQueue: gpu-cluster-queue
---
# Job 通过 label 关联队列
apiVersion: batch/v1
kind: Job
metadata:
  name: gpu-training-job
  labels:
    kueue.x-k8s.io/queue-name: gpu-training
spec:
  parallelism: 8
  completions: 8
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: train
          image: registry.k8s.io/pause:3.10
          resources:
            limits:
              nvidia.com/gpu: 1
